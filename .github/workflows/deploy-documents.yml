name: "Deploy Documents"

on:
  workflow_dispatch:

jobs:

  build-versions:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [API4, API5, API6, API7, API8, API9, API10, API11, API12, API13, API14]

    steps:
    - uses: actions/checkout@v4
      with:
        repository: TizenAPI/TizenFX-Docs
        ref: net8.0

    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Install DocFX Tool
      run: dotnet tool install -g docfx --version 2.78.4

    - name: Get Version Branch/Commit
      id: info
      run: |
        VERSION="${{ matrix.version }}"
        BRANCH=$VERSION
        if [ "$VERSION" = "API14" ]; then BRANCH="main"; fi
        
        COMMIT=$(git ls-remote https://github.com/Samsung/TizenFX.git refs/heads/$BRANCH | cut -f1)
        if [ -z "$COMMIT" ]; then COMMIT="unknown"; fi
        echo "branch=$BRANCH" >> $GITHUB_OUTPUT
        echo "commit=$COMMIT" >> $GITHUB_OUTPUT

    - name: Cache Version Build
      id: cache-v
      uses: actions/cache@v4
      with:
        path: |
          _site/${{ matrix.version }}
          _site/index-${{ matrix.version }}.json
          _site/internals
          _site/index-internals.json
          obj/${{ matrix.version }}
          obj/internals
        key: docfx-site-v2-${{ matrix.version }}-${{ steps.info.outputs.commit }}

    - name: Build Version
      if: steps.cache-v.outputs.cache-hit != 'true'
      run: |
        chmod +x ./build.sh
        # Clone only the target version
        ./build.sh clone ${{ matrix.version }}
        ./build.sh restore ${{ matrix.version }}
        ./build.sh build ${{ matrix.version }}
        
        # Build internals if current version is API14 (shared source)
        if [ "${{ matrix.version }}" == "API14" ]; then
          ./build.sh build internals
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: site-${{ matrix.version }}
        path: |
          _site/${{ matrix.version }}
          _site/index-${{ matrix.version }}.json
          _site/internals
          _site/index-internals.json
        if-no-files-found: ignore
        overwrite: true

  deploy:
    needs: [build-versions]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        repository: TizenAPI/TizenFX-Docs
        ref: net8.0

    - name: Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        path: _site
        pattern: site-*
        merge-multiple: true

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies for Indexing
      run: |
        npm install stream-json lunr

    - name: Generate Search Index
      run: |
        chmod +x ./build.sh
        ./build.sh index

    - name: Deploy GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./_site
        publish_branch: gh-pages
        user_name: 'TizenAPI-Bot'
        user_email: 'tizenapi@samsung.com'
        full_commit_message: 'Update documents (Matrix Build)'